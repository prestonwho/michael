<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="St. Michael">
    
    <title>St. Michael Chaplet</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            overflow: hidden;
            position: fixed;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #f2f2f7; /* Classic clean iOS gray */
            overscroll-behavior: none;
            touch-action: none;
        }

        .app-container {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 28px;
        }

        .header-buttons, .footer-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 300px;
        }

        .header-buttons {
            margin-bottom: 20px;
        }

        .footer-buttons {
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .action-btn, .btn, .giant-btn {
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .action-btn:active, .btn:active, .giant-btn:active {
            transform: scale(0.94);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .action-btn, .btn {
            background-color: #ffffff;
            border: 1px solid #d1d1d6;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .action-btn:active, .btn:active {
            background-color: #e5e5ea;
        }

        .action-btn {
            border-radius: 20px;
            padding: 12px 15px; /* Slightly taller padding to make them pop */
            font-size: 14px;
            font-weight: bold;
            color: #007aff;
            cursor: pointer;
            text-align: center;
        }
        
        .btn {
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #007aff;
            justify-self: center;
        }

        .action-btn.active-prayer, .btn.active-prayer, .action-btn.active-repeat {
            background-color: #007aff !important;
            border-color: #007aff !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3) !important;
        }

        .action-btn.played-prayer, .btn.played-prayer {
            background-color: #e5e5ea;
            border-color: #d1d1d6;
            color: #8e8e93;
            box-shadow: none;
        }

        .keypad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 300px;
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .giant-btn {
            width: 100%;
            max-width: 340px; /* slightly wider */
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 26px; /* rounder */
            padding: 26px 0; /* much taller */
            font-size: 26px; /* bigger font */
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 6px 15px rgba(0, 122, 255, 0.35);
            cursor: pointer;
        }

        .giant-btn:active {
            background-color: #005bb5;
        }

        #status {
            margin-top: 15px;
            height: 20px;
            color: #d9534f;
            font-weight: bold;
            text-align: center;
            font-size: 15px;
        }

        .subtitle {
            font-size: 13px;
            color: #8e8e93;
            text-align: center;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        @media screen and (orientation: landscape) {
            .app-container {
                display: grid;
                grid-template-columns: auto auto;
                grid-template-rows: auto auto auto auto auto auto;
                grid-template-areas: 
                    "title    keypad"
                    "headers  keypad"
                    "footers  keypad"
                    "nextbtn  keypad"
                    "subtitle keypad"
                    "status   keypad";
                justify-content: center;
                align-content: center;
                column-gap: 60px; 
                row-gap: 12px;
            }
            
            h1 { grid-area: title; margin: 0; text-align: center; }
            .header-buttons { grid-area: headers; margin: 0; justify-content: center; gap: 20px; }
            .keypad-container { grid-area: keypad; }
            
            .footer-buttons { 
                grid-area: footers; 
                margin: 0; 
                justify-content: center; 
                gap: 20px;
            }

            .giant-btn {
                grid-area: nextbtn;
                margin: 0;
                padding: 20px 0; /* scale back down slightly for landscape */
            }
            
            .subtitle { grid-area: subtitle; margin: 0; text-align: center; }
            #status { grid-area: status; margin: 0; text-align: center; height: 20px; }
            
            .btn { width: 75px; height: 75px; font-size: 32px; }
            .keypad { gap: 10px; }

            @media (max-height: 400px) {
                .btn { width: 65px; height: 65px; font-size: 28px; }
                .keypad { gap: 10px; }
                column-gap: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>St. Michael Chaplet</h1>
        
        <div class="header-buttons">
            <button id="btn-opening" class="action-btn" onclick="playAudio('opening')">Opening Prayer</button>
            <button id="btn-reset" class="action-btn" onclick="resetState()" style="color: #d9534f;">Reset</button>
        </div>

        <div class="keypad-container">
            <div class="keypad">
                <button id="btn-1" class="btn" onclick="playAudio(1)">1</button>
                <button id="btn-2" class="btn" onclick="playAudio(2)">2</button>
                <button id="btn-3" class="btn" onclick="playAudio(3)">3</button>
                <button id="btn-4" class="btn" onclick="playAudio(4)">4</button>
                <button id="btn-5" class="btn" onclick="playAudio(5)">5</button>
                <button id="btn-6" class="btn" onclick="playAudio(6)">6</button>
                <button id="btn-7" class="btn" onclick="playAudio(7)">7</button>
                <button id="btn-8" class="btn" onclick="playAudio(8)">8</button>
                <button id="btn-9" class="btn" onclick="playAudio(9)">9</button>
            </div>
        </div>
        
        <div class="footer-buttons">
            <button id="btn-repeat" class="action-btn" onclick="toggleRepeat()">Repeat: Off</button>
            <button id="btn-0" class="action-btn" onclick="playAudio(0)">Closing Prayers</button>
        </div>
        
        <button id="btn-next" class="giant-btn" onclick="playNext()">Play Next</button>
        
        <div class="subtitle">1-9: Salutations</div>
        <div id="status"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => registration.update())
                    .catch(error => console.log('Offline storage failed: ', error));
            });
        }

        const spriteMap = {
            'opening': { start: 0, end: 16.5 },
            1: { start: 17, end: 27.0 },
            2: { start: 27.5, end: 39.0 },
            3: { start: 39.5, end: 50.5 },
            4: { start: 51, end: 62.5 },
            5: { start: 63, end: 72.5 },
            6: { start: 73, end: 82.5 },
            7: { start: 83, end: 93.0 },
            8: { start: 93.5, end: 106.0 },
            9: { start: 106.5, end: 118.5 },
            0: { start: 119, end: 180.5 }
        };

        let currentPrayer = null;
        let isPlaying = false;
        let isRepeatOn = false;
        let wakeLock = null; 
        let audioUnlocked = false; 
        
        const audioPlayer = new Audio();
        audioPlayer.playsInline = true;
        audioPlayer.src = 'chaplet.m4a'; 

        audioPlayer.addEventListener('timeupdate', () => {
            if (currentPrayer === null || audioPlayer.paused) return;
            
            const endTime = spriteMap[currentPrayer].end;
            
            if (audioPlayer.currentTime >= endTime) {
                if (isRepeatOn) {
                    audioPlayer.currentTime = spriteMap[currentPrayer].start;
                } else {
                    audioPlayer.pause();
                    isPlaying = false;
                    markAsPlayed(currentPrayer);
                    document.getElementById('status').innerText = "Ready for Next";
                    
                    if (currentPrayer === 0) {
                        document.getElementById('status').innerText = "Chaplet Complete.";
                        setTimeout(resetState, 1500);
                    }
                }
            }
        });

        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return; 
            try {
                if (wakeLock !== null && wakeLock.released === false) return; 
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && currentPrayer !== null) {
                await requestWakeLock();
            }
        });

        function updateButtonColors(activeId) {
            document.querySelectorAll('.btn, .action-btn').forEach(btn => {
                // Ensure the Reset and Repeat buttons don't lose their specific stylings
                if (btn.id !== 'btn-reset' && btn.id !== 'btn-repeat') {
                    btn.classList.remove('active-prayer');
                }
            });
            if (activeId !== null) {
                const btn = document.getElementById(`btn-${activeId}`);
                if (btn) {
                    btn.classList.remove('played-prayer');
                    btn.classList.add('active-prayer');
                }
            }
        }

        function markAsPlayed(id) {
            const btn = document.getElementById(`btn-${id}`);
            if (btn) {
                btn.classList.remove('active-prayer');
                btn.classList.add('played-prayer');
            }
        }

        function toggleRepeat() {
            isRepeatOn = !isRepeatOn;
            const btn = document.getElementById('btn-repeat');
            if (isRepeatOn) {
                btn.innerText = "Repeat: On";
                btn.classList.add('active-repeat');
            } else {
                btn.innerText = "Repeat: Off";
                btn.classList.remove('active-repeat');
            }
        }

        function resetState() {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            
            currentPrayer = null;
            isPlaying = false;
            
            releaseWakeLock(); 
            
            document.querySelectorAll('.btn, .action-btn').forEach(btn => {
                if (btn.id !== 'btn-reset' && btn.id !== 'btn-repeat') {
                    btn.classList.remove('active-prayer');
                    btn.classList.remove('played-prayer');
                }
            });
            document.getElementById('status').innerText = "Reset complete.";
            setTimeout(() => { if (document.getElementById('status').innerText === "Reset complete.") document.getElementById('status').innerText = ""; }, 2000);
        }

        function playNext() {
            if (currentPrayer === null) {
                playAudio('opening');
            } else if (currentPrayer === 'opening') {
                playAudio(1);
            } else if (typeof currentPrayer === 'number' && currentPrayer >= 1 && currentPrayer < 9) {
                playAudio(currentPrayer + 1);
            } else if (currentPrayer === 9) {
                playAudio(0);
            }
        }

        function playAudio(id) {
            requestWakeLock();

            if (currentPrayer !== null && currentPrayer !== id) {
                markAsPlayed(currentPrayer);
            }

            currentPrayer = id;
            updateButtonColors(id);

            let displayText = id === 'opening' ? 'Opening Prayer' : (currentPrayer === 0 ? 'Closing Prayers' : `Salutation ${id}`);
            document.getElementById('status').innerText = `Playing: ${displayText}...`;
            
            if (!audioUnlocked) {
                audioUnlocked = true;
                
                audioPlayer.muted = true;
                let playPromise = audioPlayer.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        audioPlayer.currentTime = spriteMap[id].start;
                        audioPlayer.muted = false; 
                        isPlaying = true;
                    }).catch((e) => {
                        document.getElementById('status').innerText = "Error: Please tap again.";
                        audioUnlocked = false; 
                        isPlaying = false;
                    });
                }
            } else {
                audioPlayer.currentTime = spriteMap[id].start;
                audioPlayer.play().then(() => {
                    isPlaying = true;
                }).catch((e) => {
                    document.getElementById('status').innerText = "Tap to play (iOS constraint).";
                    isPlaying = false;
                });
            }
        }
    </script>
</body>
</html>
