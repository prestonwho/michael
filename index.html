<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="St. Michael">
    
    <title>St. Michael Chaplet</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            overflow: hidden;
            position: fixed;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #eef2f9;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.12) 0px, transparent 60%),
                radial-gradient(at 100% 100%, rgba(162, 0, 255, 0.08) 0px, transparent 60%);
            overscroll-behavior: none;
            touch-action: none;
        }

        .app-container {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        .header-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 300px;
            margin-bottom: 20px;
        }

        .action-btn, .btn, .nav-btn {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.8);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .action-btn:active, .btn:active, .nav-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.8);
        }

        .action-btn {
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            color: #007aff;
            cursor: pointer;
        }
        
        .btn {
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #007aff;
            justify-self: center;
        }

        .nav-btn {
            border-radius: 20px;
            width: 80px;
            padding: 10px 0;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            line-height: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .action-btn.active-prayer, .btn.active-prayer, .nav-btn.active-repeat {
            background: rgba(0, 122, 255, 0.7) !important;
            border-color: rgba(255, 255, 255, 0.4) !important;
            color: white !important;
            box-shadow: 0 8px 25px rgba(0, 122, 255, 0.35), inset 0 1px 2px rgba(255, 255, 255, 0.5) !important;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .action-btn.played-prayer, .btn.played-prayer {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            color: #999;
            box-shadow: none;
        }

        .keypad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 300px;
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 300px;
            align-items: center;
            justify-items: center;
            margin-top: 15px;
            margin-bottom: 25px;
        }
        .prev-container { justify-self: start; }
        .next-container { justify-self: end; }

        .subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }

        #status {
            margin-top: 10px;
            height: 20px;
            color: #d9534f;
            font-weight: bold;
            text-align: center;
            font-size: 14px;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }

        @media screen and (orientation: landscape) {
            .app-container {
                display: grid;
                grid-template-columns: auto auto;
                grid-template-rows: auto auto auto auto auto;
                grid-template-areas: 
                    "title    keypad"
                    "headers  keypad"
                    "botnav   keypad"
                    "subtitle keypad"
                    "status   keypad";
                justify-content: center;
                align-content: center;
                column-gap: 60px; 
                row-gap: 15px;
            }
            
            h1 { grid-area: title; margin: 0; text-align: center; }
            .header-buttons { grid-area: headers; margin: 0; justify-content: center; gap: 20px; }
            .keypad-container { grid-area: keypad; }
            
            .bottom-nav { 
                grid-area: botnav; 
                display: flex; 
                flex-direction: row; 
                justify-content: center;
                gap: 15px;
                margin: 0; 
                max-width: none;
            }
            
            .subtitle { grid-area: subtitle; margin: 0; text-align: center; }
            #status { grid-area: status; margin: 0; text-align: center; height: 20px; }
            
            .btn { width: 85px; height: 85px; font-size: 36px; }
            .keypad { gap: 15px; }
            
            .btn-zero { width: 60px; height: 60px; font-size: 26px; }
            .nav-btn { width: 75px; padding: 8px 0; font-size: 13px; }

            @media (max-height: 400px) {
                .btn { width: 75px; height: 75px; font-size: 32px; }
                .keypad { gap: 10px; }
                column-gap: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>St. Michael Chaplet</h1>
        
        <div class="header-buttons">
            <button id="btn-opening" class="action-btn" onclick="playAudio('opening')">Opening Prayer</button>
            <button id="btn-reset" class="action-btn" onclick="resetState()" style="color: #d9534f;">Reset</button>
        </div>

        <div class="keypad-container">
            <div class="keypad">
                <button id="btn-1" class="btn" onclick="playAudio(1)">1</button>
                <button id="btn-2" class="btn" onclick="playAudio(2)">2</button>
                <button id="btn-3" class="btn" onclick="playAudio(3)">3</button>
                <button id="btn-4" class="btn" onclick="playAudio(4)">4</button>
                <button id="btn-5" class="btn" onclick="playAudio(5)">5</button>
                <button id="btn-6" class="btn" onclick="playAudio(6)">6</button>
                <button id="btn-7" class="btn" onclick="playAudio(7)">7</button>
                <button id="btn-8" class="btn" onclick="playAudio(8)">8</button>
                <button id="btn-9" class="btn" onclick="playAudio(9)">9</button>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="prev-container">
                <button id="btn-repeat" class="nav-btn" onclick="toggleRepeat()">Repeat<br>Off</button>
            </div>
            <button id="btn-0" class="btn btn-zero" onclick="playAudio(0)">0</button>
            <div class="next-container">
                <button id="btn-next" class="nav-btn" onclick="playNext()">Play<br>Next</button>
            </div>
        </div>
        
        <div class="subtitle">1-9: Salutations | 0: Closing Prayers</div>
        <div id="status"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        registration.update();
                    })
                    .catch(error => console.log('Offline storage failed: ', error));
            });
        }

        const spriteMap = {
            'opening': { start: 0, end: 16.5 },
            1: { start: 17, end: 27.0 },
            2: { start: 27.5, end: 39.0 },
            3: { start: 39.5, end: 50.5 },
            4: { start: 51, end: 62.5 },
            5: { start: 63, end: 72.5 },
            6: { start: 73, end: 82.5 },
            7: { start: 83, end: 93.0 },
            8: { start: 93.5, end: 106.0 },
            9: { start: 106.5, end: 118.5 },
            0: { start: 119, end: 180.5 }
        };

        let currentPrayer = null;
        let isPlaying = false;
        let isRepeatOn = false;
        let mediaSessionInitialized = false;
        let wakeLock = null; 
        
        // NEW FLAG to prevent iOS from crashing when we change timestamps
        let audioUnlocked = false; 
        
        const audioPlayer = new Audio();
        audioPlayer.playsInline = true;
        audioPlayer.src = 'chaplet.m4a'; 

        // Monitor time to auto-pause
        audioPlayer.addEventListener('timeupdate', () => {
            if (currentPrayer === null || audioPlayer.paused) return;
            
            const endTime = spriteMap[currentPrayer].end;
            
            if (audioPlayer.currentTime >= endTime) {
                if (isRepeatOn) {
                    audioPlayer.currentTime = spriteMap[currentPrayer].start;
                } else {
                    audioPlayer.pause();
                    isPlaying = false;
                    markAsPlayed(currentPrayer);
                    document.getElementById('status').innerText = "";
                    
                    if (currentPrayer === 0) {
                        setTimeout(resetState, 1000);
                    }
                }
            }
        });

        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return; 
            try {
                if (wakeLock !== null && wakeLock.released === false) return; 
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && currentPrayer !== null) {
                await requestWakeLock();
            }
        });

        function togglePlayPause() {
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
                document.getElementById('status').innerText = "Paused";
            } else {
                if (currentPrayer !== null && audioPlayer.paused) {
                    if (audioPlayer.currentTime < spriteMap[currentPrayer].end) {
                        audioPlayer.play().catch(e => console.log(e));
                        isPlaying = true;
                        let displayText = currentPrayer === 'opening' ? 'Opening Prayer' : (currentPrayer === 0 ? 'Closing Prayers' : `Salutation ${currentPrayer}`);
                        document.getElementById('status').innerText = `Playing: ${displayText}...`;
                        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
                    } else {
                        playNext();
                    }
                } else {
                    playNext();
                }
            }
        }

        function initMediaSession() {
            if (!mediaSessionInitialized) {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: 'St. Michael Chaplet',
                        artist: 'Tap to Pause / Double-Tap for Next'
                    });

                    navigator.mediaSession.setActionHandler('play', togglePlayPause);
                    navigator.mediaSession.setActionHandler('pause', togglePlayPause);
                    navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
                }
                mediaSessionInitialized = true;
            }
        }

        function updateButtonColors(activeId) {
            document.querySelectorAll('.btn, .action-btn').forEach(btn => {
                if (btn.id !== 'btn-reset') btn.classList.remove('active-prayer');
            });
            if (activeId !== null) {
                const btn = document.getElementById(`btn-${activeId}`);
                if (btn) {
                    btn.classList.remove('played-prayer');
                    btn.classList.add('active-prayer');
                }
            }
        }

        function markAsPlayed(id) {
            const btn = document.getElementById(`btn-${id}`);
            if (btn) {
                btn.classList.remove('active-prayer');
                btn.classList.add('played-prayer');
            }
        }

        function toggleRepeat() {
            isRepeatOn = !isRepeatOn;
            const btn = document.getElementById('btn-repeat');
            if (isRepeatOn) {
                btn.innerHTML = "Repeat<br>On";
                btn.classList.add('active-repeat');
            } else {
                btn.innerHTML = "Repeat<br>Off";
                btn.classList.remove('active-repeat');
            }
        }

        function resetState() {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            
            currentPrayer = null;
            isPlaying = false;
            
            releaseWakeLock(); 
            
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "none";
            
            document.querySelectorAll('.btn, .action-btn').forEach(btn => {
                if (btn.id !== 'btn-reset') {
                    btn.classList.remove('active-prayer');
                    btn.classList.remove('played-prayer');
                }
            });
            document.getElementById('status').innerText = "Reset complete.";
            setTimeout(() => { document.getElementById('status').innerText = ""; }, 2000);
        }

        function playNext() {
            if (currentPrayer === null) {
                playAudio('opening');
            } else if (currentPrayer === 'opening') {
                playAudio(1);
            } else if (typeof currentPrayer === 'number' && currentPrayer >= 1 && currentPrayer < 9) {
                playAudio(currentPrayer + 1);
            } else if (currentPrayer === 9) {
                playAudio(0);
            }
        }

        function playAudio(id) {
            initMediaSession();
            requestWakeLock();

            if (currentPrayer !== null && currentPrayer !== id) {
                markAsPlayed(currentPrayer);
            }

            currentPrayer = id;
            updateButtonColors(id);

            let displayText = id === 'opening' ? 'Opening Prayer' : (currentPrayer === 0 ? 'Closing Prayers' : `Salutation ${id}`);
            document.getElementById('status').innerText = `Playing: ${displayText}...`;
            isPlaying = true;
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";

            // BULLETPROOF iOS UNLOCK SEQUENCE
            if (!audioUnlocked) {
                audioUnlocked = true;
                // Mute it so you don't hear a blip of the opening prayer
                audioPlayer.muted = true;
                let playPromise = audioPlayer.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        // Once iOS authorizes playback, we can safely jump to the timestamp
                        audioPlayer.currentTime = spriteMap[id].start;
                        audioPlayer.muted = false; // Unmute it
                    }).catch((e) => {
                        document.getElementById('status').innerText = "Error: Please tap again.";
                        audioUnlocked = false; // Reset so they can try again
                        isPlaying = false;
                    });
                }
            } else {
                // If it's already unlocked, just jump and play normally
                audioPlayer.currentTime = spriteMap[id].start;
                audioPlayer.play().catch((e) => {
                    document.getElementById('status').innerText = "Error: Audio playback failed.";
                    isPlaying = false;
                });
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'MediaPlayPause' || e.code === 'Space') {
                e.preventDefault();
                togglePlayPause();
            } else if (e.code === 'MediaTrackNext') {
                e.preventDefault();
                playNext();
            }
        });
    </script>
</body>
</html>
