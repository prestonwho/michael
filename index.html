<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="St. Michael">
    
    <title>St. Michael Chaplet</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            overflow: hidden;
            position: fixed;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #f2f2f7; /* Classic clean iOS gray */
            overscroll-behavior: none;
            touch-action: none;
        }

        .app-container {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 28px;
        }

        .header-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 300px;
            margin-bottom: 20px;
        }

        .action-btn, .btn, .nav-btn {
            background-color: #ffffff;
            border: 1px solid #d1d1d6;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .action-btn:active, .btn:active, .nav-btn:active, .giant-btn:active {
            transform: scale(0.94);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        
        .action-btn:active, .btn:active, .nav-btn:active {
            background-color: #e5e5ea;
        }

        .action-btn {
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            color: #007aff;
            cursor: pointer;
        }
        
        .btn {
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #007aff;
            justify-self: center;
        }

        .nav-btn {
            border-radius: 20px;
            width: 100%;
            height: 100%;
            padding: 10px 0;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            line-height: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .action-btn.active-prayer, .btn.active-prayer, .nav-btn.active-repeat {
            background-color: #007aff !important;
            border-color: #007aff !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3) !important;
        }

        .action-btn.played-prayer, .btn.played-prayer {
            background-color: #e5e5ea;
            border-color: #d1d1d6;
            color: #8e8e93;
            box-shadow: none;
        }

        .keypad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 300px;
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .sub-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 300px;
            margin-top: 15px;
            margin-bottom: 20px;
            align-items: center;
            justify-items: center;
        }

        .giant-btn {
            width: 100%;
            max-width: 300px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 20px 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .giant-btn:active {
            background-color: #005bb5;
        }

        #status {
            margin-top: 15px;
            height: 20px;
            color: #d9534f;
            font-weight: bold;
            text-align: center;
            font-size: 15px;
        }

        @media screen and (orientation: landscape) {
            .app-container {
                display: grid;
                grid-template-columns: auto auto;
                grid-template-rows: auto auto auto auto auto auto;
                grid-template-areas: 
                    "title    keypad"
                    "headers  keypad"
                    "subkey   keypad"
                    "nextbtn  keypad"
                    "status   keypad";
                justify-content: center;
                align-content: center;
                column-gap: 60px; 
                row-gap: 15px;
            }
            
            h1 { grid-area: title; margin: 0; text-align: center; }
            .header-buttons { grid-area: headers; margin: 0; justify-content: center; gap: 20px; }
            .keypad-container { grid-area: keypad; }
            
            .sub-keypad { 
                grid-area: subkey; 
                margin: 0; 
                max-width: none;
            }

            .giant-btn {
                grid-area: nextbtn;
                margin: 0;
                padding: 15px 0;
            }
            
            #status { grid-area: status; margin: 0; text-align: center; height: 20px; }
            
            .btn { width: 75px; height: 75px; font-size: 32px; }
            .keypad { gap: 10px; }
            .btn-zero { width: 60px; height: 60px; font-size: 26px; }

            @media (max-height: 400px) {
                .btn { width: 65px; height: 65px; font-size: 28px; }
                .keypad { gap: 10px; }
                column-gap: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>St Michael Chaplet</h1>
        
        <div class="header-buttons">
            <button id="btn-opening" class="action-btn" onclick="playAudio('opening')">Opening Prayer</button>
            <button id="btn-reset" class="action-btn" onclick="resetState()" style="color: #d9534f;">Reset</button>
        </div>

        <div class="keypad-container">
            <div class="keypad">
                <button id="btn-1" class="btn" onclick="playAudio(1)">1</button>
                <button id="btn-2" class="btn" onclick="playAudio(2)">2</button>
                <button id="btn-3" class="btn" onclick="playAudio(3)">3</button>
                <button id="btn-4" class="btn" onclick="playAudio(4)">4</button>
                <button id="btn-5" class="btn" onclick="playAudio(5)">5</button>
                <button id="btn-6" class="btn" onclick="playAudio(6)">6</button>
                <button id="btn-7" class="btn" onclick="playAudio(7)">7</button>
                <button id="btn-8" class="btn" onclick="playAudio(8)">8</button>
                <button id="btn-9" class="btn" onclick="playAudio(9)">9</button>
            </div>
        </div>
        
        <div class="sub-keypad">
            <button id="btn-repeat" class="nav-btn" onclick="toggleRepeat()">Repeat<br>Off</button>
            <button id="btn-0" class="btn btn-zero" onclick="playAudio(0)">0</button>
            <div></div> <!-- Empty slot to align 0 perfectly under 8 -->
        </div>
        
        <button id="btn-next" class="giant-btn" onclick="playNext()">Play Next</button>
        
        <div id="status"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => registration.update())
                    .catch(error => console.log('Offline storage failed: ', error));
            });
        }

        const spriteMap = {
            'opening': { start: 0, end: 16.5 },
            1: { start: 17, end: 27.0 },
            2: { start: 27.5, end: 39.0 },
            3: { start: 39.5, end: 50.5 },
            4: { start: 51, end: 62.5 },
            5: { start: 63, end: 72.5 },
            6: { start: 73, end: 82.5 },
            7: { start: 83, end: 93.0 },
            8: { start: 93.5, end: 106.0 },
            9: { start: 106.5, end: 118.5 },
            0: { start: 119, end: 180.5 }
        };

        let currentPrayer = null;
        let isPlaying = false;
        let isRepeatOn = false;
        let wakeLock = null; 
        let audioUnlocked = false; 
        
        const audioPlayer = new Audio();
        audioPlayer.playsInline = true;
        audioPlayer.src = 'chaplet.m4a'; 

        audioPlayer.addEventListener('timeupdate', () => {
            if (currentPrayer === null || audioPlayer.paused) return;
            
            const endTime = spriteMap[currentPrayer].end;
            
            if (audioPlayer.currentTime >= endTime) {
                if (isRepeatOn) {
                    audioPlayer.currentTime = spriteMap[currentPrayer].start;
                } else {
                    audioPlayer.pause();
                    isPlaying = false;
                    markAsPlayed(currentPrayer);
                    document.getElementById('status').innerText = "Ready for Next";
                    
                    if (currentPrayer === 0) {
                        document.getElementById('status').innerText = "Chaplet Complete.";
                        setTimeout(resetState, 1500);
                    }
                }
            }
        });

        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return; 
            try {
                if (wakeLock !== null && wakeLock.released === false) return; 
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && currentPrayer !== null) {
                await requestWakeLock();
            }
        });

            document.querySelectorAll('.btn, .action-bt
