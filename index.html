<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="St. Michael">
    
    <title>St. Michael Chaplet</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            overflow: hidden;
            position: fixed;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #f2f2f7;
            overscroll-behavior: none;
            touch-action: none;
        }

        .app-container {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
        }

        .header-buttons, .footer-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 300px;
        }

        .header-buttons {
            margin-bottom: 20px;
        }

        .footer-buttons {
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .action-btn, .btn, .giant-btn {
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .action-btn:active, .btn:active, .giant-btn:active {
            transform: scale(0.94);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .action-btn, .btn {
            background-color: #ffffff;
            border: 1px solid #d1d1d6;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .action-btn:active, .btn:active {
            background-color: #e5e5ea;
        }

        .action-btn {
            border-radius: 20px;
            padding: 12px 15px; 
            font-size: 14px;
            font-weight: bold;
            color: #007aff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .btn {
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #007aff;
            justify-self: center;
        }

        /* PLAYING STATE */
        .action-btn.active-prayer, .btn.active-prayer, .action-btn.active-repeat {
            background-color: #007aff !important;
            border-color: #007aff !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3) !important;
        }

        /* PAUSED STATE (Breathing Animation) */
        @keyframes pause-breath {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .action-btn.paused-prayer, .btn.paused-prayer {
            background-color: #007aff !important;
            border-color: #007aff !important;
            color: #ffffff !important;
            animation: pause-breath 2s infinite ease-in-out;
        }

        /* QUEUED STATE */
        .action-btn.queued-prayer, .btn.queued-prayer {
            border-color: #007aff !important;
            background-color: #e5f1ff !important; 
            box-shadow: 0 0 0 1px #007aff !important; 
        }

        .keypad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 300px;
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .giant-btn {
            width: 100%;
            max-width: 340px; 
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 26px; 
            padding: 50px 0; 
            font-size: 28px; 
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 6px 15px rgba(0, 122, 255, 0.35);
            cursor: pointer;
        }

        .giant-btn:active {
            background-color: #005bb5;
        }

        #status {
            margin-top: 20px;
            height: 20px;
            color: #d9534f;
            font-weight: bold;
            text-align: center;
            font-size: 15px;
        }

        @media screen and (orientation: landscape) {
            .app-container {
                display: grid;
                grid-template-columns: auto auto;
                grid-template-rows: auto auto auto auto;
                grid-template-areas: 
                    "headers  keypad"
                    "footers  keypad"
                    "nextbtn  keypad"
                    "status   keypad";
                justify-content: center;
                align-content: center;
                column-gap: 60px; 
                row-gap: 12px;
            }
            
            .header-buttons { grid-area: headers; margin: 0; justify-content: center; gap: 20px; }
            .keypad-container { grid-area: keypad; }
            
            .footer-buttons { 
                grid-area: footers; 
                margin: 0; 
                justify-content: center; 
                gap: 20px;
            }

            .giant-btn {
                grid-area: nextbtn;
                margin: 0;
                padding: 35px 0; 
            }
            
            #status { grid-area: status; margin: 0; text-align: center; height: 20px; }
            
            .btn { width: 75px; height: 75px; font-size: 32px; }
            .keypad { gap: 10px; }

            @media (max-height: 400px) {
                .btn { width: 65px; height: 65px; font-size: 28px; }
                .keypad { gap: 10px; }
                column-gap: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-buttons">
            <button id="btn-opening" class="action-btn" onclick="playAudio('opening')" style="flex-grow: 1; margin-right: 15px;">Opening</button>
            <button id="btn-stop" class="action-btn" onclick="stopState()" style="color: #d9534f; min-width: 64px;" aria-label="Stop">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="5" y="5" width="14" height="14" rx="2" ry="2"></rect>
                </svg>
            </button>
        </div>

        <div class="keypad-container">
            <div class="keypad">
                <button id="btn-1" class="btn" onclick="playAudio(1)">1</button>
                <button id="btn-2" class="btn" onclick="playAudio(2)">2</button>
                <button id="btn-3" class="btn" onclick="playAudio(3)">3</button>
                <button id="btn-4" class="btn" onclick="playAudio(4)">4</button>
                <button id="btn-5" class="btn" onclick="playAudio(5)">5</button>
                <button id="btn-6" class="btn" onclick="playAudio(6)">6</button>
                <button id="btn-7" class="btn" onclick="playAudio(7)">7</button>
                <button id="btn-8" class="btn" onclick="playAudio(8)">8</button>
                <button id="btn-9" class="btn" onclick="playAudio(9)">9</button>
            </div>
        </div>
        
        <div class="footer-buttons">
            <button id="btn-repeat" class="action-btn" onclick="toggleRepeat()" style="min-width: 64px; margin-right: 15px;" aria-label="Repeat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 2l4 4-4 4"></path>
                    <path d="M3 11v-1a4 4 0 0 1 4-4h14"></path>
                    <path d="M7 22l-4-4 4-4"></path>
                    <path d="M21 13v1a4 4 0 0 1-4 4H3"></path>
                </svg>
            </button>
            <button id="btn-0" class="action-btn" onclick="playAudio(0)" style="flex-grow: 1;">Closing</button>
        </div>
        
        <button id="btn-next" class="giant-btn" onclick="playNext()">Play Next</button>
        
        <div id="status"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => registration.update())
                    .catch(error => console.log('Offline storage failed: ', error));
            });
        }

        const spriteMap = {
            'opening': { start: 0, end: 16.5 },
            1: { start: 17, end: 27.0 },
            2: { start: 27.5, end: 39.0 },
            3: { start: 39.5, end: 50.5 },
            4: { start: 51, end: 62.5 },
            5: { start: 63, end: 72.5 },
            6: { start: 73, end: 82.5 },
            7: { start: 83, end: 93.0 },
            8: { start: 93.5, end: 106.0 },
            9: { start: 106.5, end: 118.5 },
            0: { start: 119, end: 180.5 }
        };

        let currentPrayer = null;
        let isPlaying = false;
        let isRepeatOn = false;
        let wakeLock = null; 
        let audioUnlocked = false; 
        
        const audioPlayer = new Audio();
        audioPlayer.playsInline = true;
        audioPlayer.src = 'chaplet.m4a'; 

        audioPlayer.addEventListener('timeupdate', () => {
            if (currentPrayer === null || audioPlayer.paused) return;
            
            const endTime = spriteMap[currentPrayer].end;
            
            if (audioPlayer.currentTime >= endTime) {
                if (isRepeatOn) {
                    audioPlayer.currentTime = spriteMap[currentPrayer].start;
                } else {
                    audioPlayer.pause();
                    isPlaying = false;
                    
                    let nextId = null;
                    if (currentPrayer === 'opening') nextId = 1;
                    else if (typeof currentPrayer === 'number' && currentPrayer >= 1 && currentPrayer < 9) nextId = currentPrayer + 1;
                    else if (currentPrayer === 9) nextId = 0;
                    
                    updateButtonColors(null, nextId, false);
                    
                    if (currentPrayer === 0) {
                        document.getElementById('status').innerText = "Chaplet Complete.";
                        setTimeout(stopState, 1500);
                    } else {
                        let nextName = nextId === 0 ? "Closing" : `Salutation ${nextId}`;
                        document.getElementById('status').innerText = `Up Next: ${nextName}`;
                    }
                }
            }
        });

        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return; 
            try {
                if (wakeLock !== null && wakeLock.released === false) return; 
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) { }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && currentPrayer !== null) {
                await requestWakeLock();
            }
        });

        function updateButtonColors(activeId, queuedId = null, paused = false) {
            document.querySelectorAll('.btn, .action-btn').forEach(btn => {
                if (btn.id !== 'btn-stop' && btn.id !== 'btn-repeat') {
                    btn.classList.remove('active-prayer', 'queued-prayer', 'paused-prayer');
                }
            });
            if (activeId !== null) {
                const btn = document.getElementById(`btn-${activeId}`);
                if (btn) {
                    if (paused) {
                        btn.classList.add('paused-prayer');
                    } else {
                        btn.classList.add('active-prayer');
                    }
                }
            }
            if (queuedId !== null) {
                const btn = document.getElementById(`btn-${queuedId}`);
                if (btn) btn.classList.add('queued-prayer');
            }
        }

        function updateStatusText(id, playing) {
            if (!playing) {
                document.getElementById('status').innerText = "Paused";
                return;
            }
            let displayText = id === 'opening' ? 'Opening' : (id === 0 ? 'Closing' : `Salutation ${id}`);
            document.getElementById('status').innerText = `Playing: ${displayText}...`;
        }

        function toggleRepeat() {
            isRepeatOn = !isRepeatOn;
            const btn = document.getElementById('btn-repeat');
            if (isRepeatOn) {
                btn.classList.add('active-repeat');
            } else {
                btn.classList.remove('active-repeat');
            }
        }

        function stopState() {
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            
            currentPrayer = null;
            isPlaying = false;
            
            releaseWakeLock(); 
            updateButtonColors(null);
            
            document.getElementById('status').innerText = "Stopped.";
            setTimeout(() => { if (document.getElementById('status').innerText === "Stopped.") document.getElementById('status').innerText = ""; }, 2000);
        }

        function playNext() {
            if (currentPrayer === null) {
                playAudio('opening');
            } else if (currentPrayer === 'opening') {
                playAudio(1);
            } else if (typeof currentPrayer === 'number' && currentPrayer >= 1 && currentPrayer < 9) {
                playAudio(currentPrayer + 1);
            } else if (currentPrayer === 9) {
                playAudio(0);
            }
        }

        function playAudio(id) {
            requestWakeLock();

            if (currentPrayer === id) {
                if (audioPlayer.currentTime >= spriteMap[id].end) {
                    audioPlayer.currentTime = spriteMap[id].start;
                    audioPlayer.play().then(() => {
                        isPlaying = true;
                        updateButtonColors(id, null, false);
                        updateStatusText(id, true);
                    }).catch(e => {
                        document.getElementById('status').innerText = "Tap to play (iOS constraint).";
                    });
                } else if (audioPlayer.paused) {
                    audioPlayer.play().then(() => {
                        isPlaying = true;
                        updateButtonColors(id, null, false);
                        updateStatusText(id, true);
                    }).catch(e => {
                        document.getElementById('status').innerText = "Tap to play (iOS constraint).";
                    });
                } else {
                    audioPlayer.pause();
                    isPlaying = false;
                    updateButtonColors(id, null, true);
                    updateStatusText(id, false);
                }
                return; 
            }

            currentPrayer = id;
            updateButtonColors(id, null, false); 
            updateStatusText(id, true);
            
            if (!audioUnlocked) {
                audioUnlocked = true;
                
                audioPlayer.muted = true;
                let playPromise = audioPlayer.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        audioPlayer.currentTime = spriteMap[id].start;
                        audioPlayer.muted = false; 
                        isPlaying = true;
                    }).catch((e) => {
                        document.getElementById('status').innerText = "Error: Please tap again.";
                        audioUnlocked = false; 
                        isPlaying = false;
                    });
                }
            } else {
                audioPlayer.currentTime = spriteMap[id].start;
                audioPlayer.play().then(() => {
                    isPlaying = true;
                }).catch((e) => {
                    document.getElementById('status').innerText = "Tap to play (iOS constraint).";
                    isPlaying = false;
                });
            }
        }
    </script>
</body>
</html>
